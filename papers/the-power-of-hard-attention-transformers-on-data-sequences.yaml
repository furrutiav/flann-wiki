title: "The Power of Hard Attention Transformers on Data Sequences: A Formal Language Theoretic Perspective"
authors:
  - "Pascal Bergstrasser"
  - "Chris Kocher"
  - "Anthony Widjaja Lin"
  - "Georg Zetzsche"
venue: "Advances in Neural Information Processing Systems"
year: 2024
urls:
  abstract: "https://arxiv.org/abs/2405.16166"
  pdf: "https://proceedings.neurips.cc/paper_files/paper/2024/file/af58a33861ac45472ea1cc5860d2b13e-Paper-Conference.pdf"
  arxiv: "https://arxiv.org/abs/2405.16166"
abstract: >-
  Formal language theory has recently been successfully employed to unravel the
  power of transformer encoders. This setting is primarily applicable in Natural
  Language Processing (NLP), as a token embedding function (where a bounded
  number of tokens is admitted) is first applied before feeding the input to the
  transformer. On certain kinds of data (e.g. time series), we want our
  transformers to be able to handle arbitrary input sequences of numbers (or
  tuples thereof) without a priori limiting the values of these numbers. In this
  paper, we initiate the study of the expressive power of transformer encoders on
  sequences of data (i.e. tuples of numbers). Our results indicate an increase in
  expressive power of hard attention transformers over data sequences, in stark
  contrast to the case of strings. In particular, we prove that Unique Hard
  Attention Transformers (UHAT) over inputs as data sequences no longer lie
  within the circuit complexity class AC0 (even without positional encodings),
  unlike the case of string inputs, but are still within the complexity class TC0
  (even with positional encodings). Over strings, UHAT without positional
  encodings capture only regular languages. In contrast, we show that over data
  sequences UHAT can capture non-regular properties. Finally, we show that UHAT
  capture languages definable in an extension of linear temporal logic with unary
  numeric predicates and arithmetics.
summary: >-
  This paper extends formal-language analysis of transformers from finite
  alphabets to data sequences whose symbols can contain numbers. It shows that
  hard-attention transformers gain expressive power in this setting, with UHAT
  able to capture non-regular properties over data sequences while remaining
  bounded by TC0.
tags:
  - "transformers"
  - "hard-attention"
  - "data-sequences"
  - "formal-languages"
  - "expressivity"
