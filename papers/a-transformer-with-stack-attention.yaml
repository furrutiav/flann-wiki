title: "A Transformer with Stack Attention"
authors:
  - "Jiaoda Li"
  - "Jennifer C. White"
  - "Mrinmaya Sachan"
  - "Ryan Cotterell"
venue: "Findings of the Association for Computational Linguistics: NAACL"
year: 2024
urls:
  abstract: "https://aclanthology.org/2024.findings-naacl.269/"
  pdf: "https://aclanthology.org/2024.findings-naacl.269.pdf"
  arxiv: "https://arxiv.org/abs/2405.04515"
abstract: >-
  Natural languages are believed to be (mildly) context-sensitive. Despite
  underpinning remarkably capable large language models, transformers are unable
  to model many context-free language tasks. In an attempt to address this
  limitation in the modeling power of transformer-based language models, we
  propose augmenting them with a differentiable, stack-based attention
  mechanism. Our stack-basedattention mechanism can be incorporated into any
  transformer-based language model and adds a level of interpretability to the
  model. We show that the addition of our stack-based attention mechanism
  enables the transformer to model some, but not all, deterministic
  context-freelanguages.
summary: >-
  This paper augments transformers with a differentiable stack-based attention
  mechanism motivated by the inability of standard transformers to model some
  context-free language tasks. It connects transformer architecture design with
  pushdown-style computation and formal-language expressivity.
tags:
  - "transformers"
  - "stack-attention"
  - "context-free-languages"
  - "expressivity"
  - "interpretability"
