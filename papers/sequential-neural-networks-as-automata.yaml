title: "Sequential Neural Networks as Automata"
authors:
  - "William Merrill"
venue: "Proceedings of the Workshop on Deep Learning and Formal Languages: Building Bridges"
year: 2019
pages: "1-13"
urls:
  abstract: "https://aclanthology.org/W19-3901/"
  pdf: "https://aclanthology.org/W19-3901.pdf"
  doi: "https://doi.org/10.18653/v1/W19-3901"
abstract: >-
  This work attempts to explain the types of computation that neural networks can
  perform by relating them to automata. We first define what it means for a
  real-time network with bounded precision to accept a language. A measure of
  network memory follows from this definition. We then characterize the classes
  of languages acceptable by various recurrent networks, attention, and
  convolutional networks. We find that LSTMs function like counter machines and
  relate convolutional networks to the subregular hierarchy. Overall, this work
  attempts to increase our understanding and ability to interpret neural networks
  through the lens of theory. These theoretical insights help explain neural
  computation, as well as the relationship between neural networks and natural
  language grammar.
summary: >-
  This paper relates bounded-precision sequential neural networks to automata and
  uses that connection to characterize the languages accepted by recurrent,
  attention-based, and convolutional architectures. It argues that LSTMs behave
  like counter machines and that convolutional networks connect naturally to the
  subregular hierarchy, making it an early FLaNN-style map from neural models to
  formal computation.
