title: "Formal Language Theory Meets Modern NLP"
authors:
  - "William Merrill"
venue: "arXiv"
year: 2021
urls:
  abstract: "https://arxiv.org/abs/2102.10094"
abstract: >-
  NLP is deeply intertwined with the formal study of language, both conceptually
  and historically. Arguably, this connection goes all the way back to Chomsky's
  Syntactic Structures in 1957. It also still holds true today, with a strand of
  recent works building formal analysis of modern neural networks methods in
  terms of formal languages. In this document, I aim to explain background about
  formal languages as they relate to this recent work. I will by necessity ignore
  large parts of the rich history of this field, instead focusing on concepts
  connecting to modern deep learning-based NLP.
summary: >-
  This survey-style note introduces formal language theory for modern neural NLP
  analysis. It is useful as background material linking classical language
  theory, the Chomsky hierarchy, and formal analyses of neural network
  architectures.
tags:
  - "formal-languages"
  - "NLP"
  - "survey"
  - "theory"
  - "background"
