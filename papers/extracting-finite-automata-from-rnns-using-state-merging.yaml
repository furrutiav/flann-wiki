title: "Extracting Finite Automata from RNNs Using State Merging"
authors:
  - "William Merrill"
  - "Nikolaos Tsilivis"
venue: "arXiv"
year: 2022
urls:
  abstract: "https://arxiv.org/abs/2201.12451"
abstract: >-
  One way to interpret the behavior of a blackbox recurrent neural network (RNN)
  is to extract from it a more interpretable discrete computational model, like a
  finite state machine, that captures its behavior. In this work, we propose a
  new method for extracting finite automata from RNNs inspired by the state
  merging paradigm from grammatical inference. We demonstrate the effectiveness
  of our method on the Tomita languages benchmark, where we find that it is able
  to extract faithful automata from RNNs trained on all languages in the
  benchmark. We find that extraction performance is aided by the number of data
  provided during the extraction process, as well as, curiously, whether the RNN
  model is trained for additional epochs after perfectly learning its target
  language. We use our method to analyze this phenomenon, finding that training
  beyond convergence is useful because it leads to compression of the internal
  state space of the RNN. This finding demonstrates how our method can be used
  for interpretability and analysis of trained RNN models.
summary: >-
  This paper extracts deterministic finite automata from trained RNNs via state
  merging, using RNN representation similarity to guide merges. It is a useful
  interpretability and grammatical-inference entry for understanding the implicit
  state spaces learned by RNNs.
tags:
  - "rnn"
  - "finite-automata"
  - "state-merging"
  - "model-extraction"
  - "interpretability"
