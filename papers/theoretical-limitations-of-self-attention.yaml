title: "Theoretical Limitations of Self-Attention in Neural Sequence Models"
authors:
  - "Michael Hahn"
venue: "Transactions of the Association for Computational Linguistics"
year: 2020
volume: 8
pages: "156-171"
urls:
  abstract: "https://aclanthology.org/2020.tacl-1.11/"
  pdf: "https://aclanthology.org/2020.tacl-1.11.pdf"
  doi: "https://doi.org/10.1162/tacl_a_00306"
abstract: >-
  Transformers are emerging as the new workhorse of NLP, showing great
  success across tasks. Unlike LSTMs, transformers process input sequences
  entirely through self-attention. Previous work has suggested that the
  computational capabilities of self-attention to process hierarchical
  structures are limited. In this work, we mathematically investigate the
  computational power of self-attention to model formal languages. Across
  both soft and hard attention, we show strong theoretical limitations of the
  computational abilities of self-attention, finding that it cannot model
  periodic finite-state languages, nor hierarchical structure, unless the
  number of layers or heads increases with input length. These limitations
  seem surprising given the practical success of self-attention and the
  prominent role assigned to hierarchical structure in linguistics,
  suggesting that natural language can be approximated well with models that
  are too weak for the formal languages typically assumed in theoretical
  linguistics.
summary: >-
  This paper gives formal limitations on the ability of self-attention models to
  process languages with periodic or hierarchical structure. It shows that both
  hard and soft attention face strong constraints unless the number of layers or
  heads grows with input length. The result is central to the FLaNN view of
  transformers through formal language theory and linguistic structure.
tags:
  - "transformers"
  - "self-attention"
  - "formal-languages"
  - "expressivity"
  - "limitations"

