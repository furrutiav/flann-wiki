title: "Context-Free Transductions with Neural Stacks"
authors:
  - "Yiding Hao"
  - "William Merrill"
  - "Dana Angluin"
  - "Robert Frank"
  - "Noah Amsel"
  - "Andrew Benz"
  - "Simon Mendelsohn"
venue: "Proceedings of the 2018 EMNLP Workshop BlackboxNLP"
year: 2018
pages: "306-315"
urls:
  abstract: "https://aclanthology.org/W18-5433/"
  pdf: "https://aclanthology.org/W18-5433.pdf"
  doi: "https://doi.org/10.18653/v1/W18-5433"
abstract: >-
  This paper analyzes the behavior of stack-augmented recurrent neural network
  (RNN) models. Due to the architectural similarity between stack RNNs and
  pushdown transducers, we train stack RNN models on a number of tasks, including
  string reversal, context-free language modelling, and cumulative XOR
  evaluation. Examining the behavior of our networks, we show that
  stack-augmented RNNs can discover intuitive stack-based strategies for solving
  our tasks. However, stack RNNs are more difficult to train than classical
  architectures such as LSTMs. Rather than employ stack-based strategies, more
  complex networks often find approximate solutions by using the stack as
  unstructured memory.
summary: >-
  This paper studies stack-augmented recurrent neural networks as models for
  context-free transductions. It trains neural stack models on tasks such as
  string reversal, context-free language modeling, and cumulative XOR, then
  analyzes when the learned networks discover stack-like strategies and when they
  use the stack as less structured memory.
tags:
