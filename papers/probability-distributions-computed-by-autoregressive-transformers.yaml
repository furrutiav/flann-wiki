title: "Probability Distributions Computed by Autoregressive Transformers"
authors:
  - "Andy Yang"
  - "Anej Svete"
  - "Jiaoda Li"
  - "Anthony Widjaja Lin"
  - "Jonathan Rawski"
  - "Ryan Cotterell"
  - "David Chiang"
venue: "arXiv"
year: 2025
urls:
  abstract: "https://arxiv.org/abs/2510.27118"
abstract: >-
  Most expressivity results for transformers treat them as language recognizers
  (which accept or reject strings), and not as they are used in practice, as
  language models (which generate strings autoregressively and probabilistically).
  We characterize the probability distributions that transformer language models
  can express. We show that making transformer language recognizers
  autoregressive can sometimes increase their expressivity, and that making them
  probabilistic can break equivalences that hold in the non-probabilistic case.
  Our overall contribution is to tease apart what functions transformers are
  capable of expressing, in their most common use-case as language models.
summary: >-
  This preprint shifts transformer expressivity analysis from language
  recognition to probability distributions computed by autoregressive language
  models. It studies transformers as probabilistic generators and shows that
  autoregression and probability can change the expressivity picture relative to
  non-probabilistic recognizer settings.
tags:
  - "transformers"
  - "autoregressive-models"
  - "language-models"
  - "probabilistic-models"
  - "expressivity"
