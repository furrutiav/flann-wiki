title: "Strassen Attention, Split VC Dimension and Compositionality in Transformers"
authors:
  - "Alexander Kozachinskiy"
  - "Felipe Urrutia"
  - "Hector Jimenez"
  - "Tomasz Steifer"
  - "German Pizarro"
  - "Matias Fuentes"
  - "Francisco Meza"
  - "Cristian B. Calderon"
  - "Cristobal Rojas"
venue: "Advances in Neural Information Processing Systems"
year: 2025
urls:
  abstract: "https://openreview.net/forum?id=C9JMOzKD9k"
  pdf: "https://openreview.net/pdf?id=C9JMOzKD9k"
  arxiv: "https://arxiv.org/abs/2501.19215"
abstract: >-
  We propose the first method to show theoretical limitations for one-layer
  softmax transformers with arbitrarily many precision bits (even infinite). We
  establish those limitations for three tasks that require advanced reasoning.
  The first task, Match 3 (Sanford et al., 2023), requires looking at all
  possible token triplets in an input sequence. The second and third tasks
  address compositionality-based reasoning: function composition (Peng et al.,
  2024) and binary relations composition, respectively. We formally prove the
  inability of one-layer softmax Transformers to solve any of these tasks. To
  overcome these limitations, we introduce Strassen attention and prove that,
  equipped with this mechanism, a one-layer transformer can in principle solve
  all these tasks. Importantly, we show that it enjoys sub-cubic running-time
  complexity, making it more scalable than similar previously proposed
  mechanisms, such as higher-order attention (Sanford et al., 2023). To
  complement our theoretical findings, we experimentally studied Strassen
  attention and compared it against standard (Vaswani et al, 2017), higher-order
  attention (Sanford et al., 2023), and triangular attention (Bergen et al. 2021).
  Our results help to disentangle all these attention mechanisms, highlighting
  their strengths and limitations. In particular, Strassen attention outperforms
  standard attention significantly on all the tasks. Altogether, understanding
  the theoretical limitations can guide research towards scalable attention
  mechanisms that improve the reasoning abilities of Transformers.
summary: >-
  This paper proves limitations for one-layer softmax transformers on tasks that
  require triplet-level or compositional reasoning, then introduces Strassen
  attention as a more scalable higher-order attention mechanism. It belongs in
  the database as both an expressivity result and an architecture proposal for
  improving transformer reasoning.
