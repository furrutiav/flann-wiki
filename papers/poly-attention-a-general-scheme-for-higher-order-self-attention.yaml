title: "Poly-attention: a general scheme for higher-order self-attention"
authors:
  - "Sayak Chakrabarti"
  - "Toniann Pitassi"
  - "Josh Alman"
venue: "arXiv"
year: 2026
urls:
  abstract: "https://arxiv.org/abs/2602.02422"
  pdf: "https://arxiv.org/pdf/2602.02422"
abstract: >-
  The self-attention mechanism, at the heart of the Transformer model, is able to
  effectively model pairwise interactions between tokens. However, numerous
  recent works have shown that it is unable to perform basic tasks involving
  detecting triples of correlated tokens, or compositional tasks where multiple
  input tokens need to be referenced to generate a result. Some higher-dimensional
  alternatives to self-attention have been proposed to address this, including
  higher-order attention and Strassen attention, which can perform some of these
  polyadic tasks in exchange for slower, superquadratic running times. In this
  work, we define a vast class of generalizations of self-attention, which we
  call poly-attention mechanisms. Our mechanisms can incorporate arbitrary
  higher-order (tensor) computations as well as arbitrary relationship structures
  between the input tokens, and they include the aforementioned alternatives as
  special cases. We then systematically study their computational complexity and
  representational strength, including giving new algorithms and matching
  complexity-theoretic lower bounds on the time complexity of computing the
  attention matrix exactly as well as approximately, and tightly determining
  which polyadic tasks they can each perform. Our results give interesting
  trade-offs between different desiderata for these mechanisms, including a tight
  relationship between how expressive a mechanism is, and how large the
  coefficients in the model may be so that the mechanism can be approximated in
  almost-linear time. Notably, we give a new attention mechanism which can be
  computed exactly in quadratic time, and which can perform function composition
  for any fixed number of functions. Prior mechanisms, even for just composing
  two functions, could only be computed in superquadratic time, and our new lower
  bounds show that faster algorithms for them are not possible.
summary: >-
  This preprint defines poly-attention, a broad family of higher-order
  self-attention mechanisms that includes Strassen attention and other tensorial
  variants. It studies the computational cost and representational power of these
  mechanisms, including tight tradeoffs between expressivity and efficient
  approximation.
