title: "Simplicity Bias in Transformers and their Ability to Learn Sparse Boolean Functions"
authors:
  - "Satwik Bhattamishra"
  - "Arkil Patel"
  - "Varun Kanade"
  - "Phil Blunsom"
venue: "Proceedings of the 61st Annual Meeting of the Association for Computational Linguistics"
year: 2023
pages: "5767-5791"
urls:
  abstract: "https://aclanthology.org/2023.acl-long.317/"
  pdf: "https://aclanthology.org/2023.acl-long.317.pdf"
  doi: "https://doi.org/10.18653/v1/2023.acl-long.317"
abstract: >-
  Despite the widespread success of Transformers on NLP tasks, recent works have
  found that they struggle to model several formal languages when compared to
  recurrent models. This raises the question of why Transformers perform well in
  practice and whether they have any properties that enable them to generalize
  better than recurrent models. In this work, we conduct an extensive empirical
  study on Boolean functions to demonstrate the following: (i) Random
  Transformers are relatively more biased towards functions of low sensitivity.
  (ii) When trained on Boolean functions, both Transformers and LSTMs prioritize
  learning functions of low sensitivity, with Transformers ultimately converging
  to functions of lower sensitivity. (iii) On sparse Boolean functions which have
  low sensitivity, we find that Transformers generalize near perfectly even in
  the presence of noisy labels whereas LSTMs overfit and achieve poor
  generalization accuracy. Overall, our results provide strong quantifiable
  evidence that suggests differences in the inductive biases of Transformers and
  recurrent models which may help explain Transformer's effective generalization
  performance despite relatively limited expressiveness.
summary: >-
  This paper studies inductive bias in transformers through sparse Boolean
  functions. It shows that random transformers and trained transformers are biased
  toward lower-sensitivity functions, and that this bias can help explain strong
  generalization on sparse Boolean tasks despite known formal-language
  limitations.
